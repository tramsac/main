<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loa Biến Động Số Dư</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- External CSS -->
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="icon"
        href="https://png.pngtree.com/png-clipart/20230508/original/pngtree-megaphone-icon-png-image_9150343.png"
        type="image/png">
</head>

<body>
    <div class="app-header text-center py-3 bg-primary text-white">
        <h1>Trạm rửa xe thông minh</h1>
    </div>

    <!-- Tabs dưới tiêu đề -->
    <nav class="nav-tabs-container">
        <ul class="nav nav-tabs justify-content-center">
            <li class="nav-item">
                <a class="nav-link active" href="#"><i class="bi bi-house"></i> Trang chủ</a>
            </li>
        </ul>
    </nav>

    <div class="container mt-3">
        <div class="card mb-3">
            <div class="card-body">
                <h5 class="card-title">Chào mừng</h5>
                <p class="card-text">Ứng dụng theo dõi biến động số dư của bạn mọi lúc, mọi nơi.</p>
                <div class="mt-3">
                    <div class="mt-3">

                        <!-- THIẾT BỊ -->
                        <p>
                            <strong>Trạng thái thiết bị:</strong>
                            <img id="device-status-icon" src="https://cdn-icons-png.flaticon.com/512/190/190411.png"
                                style="width: 20px;">
                            <span id="device-status-text">OFFLINE</span>
                        </p>
                        <p>
                            <strong>Chế độ:</strong>
                            <span id="mode" style="font-weight: bold; color: #0026ff;">...</span>
                            <span id="device-status-time" style="font-weight: bold; color: #0026ff;"> ... </span>
                        </p>
                        <p>
                            <strong>Uptime:</strong>
                            <span id="uptime">0s</span>
                        </p>

                        <p>
                            <strong>WiFi thiết bị:</strong>
                            <span id="device-wifi">---</span>
                            (<span id="rssi">---</span> dBm)
                        </p>

                        <!-- ĐIỆN THOẠI -->
                        <p>
                            <strong>Trạng thái SERVER:</strong>
                            <img id="server-status-icon" src="https://cdn-icons-png.flaticon.com/512/190/190406.png"
                                style="width: 20px;">
                            <span id="server-status-text">Offline</span>
                        </p>
                        <p>
                            <strong>Điều khiển:</strong><br>

                            <button id="btn-on" style="
            padding: 12px 30px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            background-color: green;
            color: white;
            margin-right: 40px;
        ">
                                ON
                            </button>

                            <button id="btn-off" style="
            padding: 12px 30px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            background-color: red;
            color: white;
        ">
                                OFF
                            </button>
                        </p>
                        <p>
                            <strong>Tổng tiền</strong>
                            <span id="total-display" style="font-weight: bold; color: #0026ff;"></span>
                        </p>
                    </div>
                </div>
            </div>

            <!-- Nút Thêm Dòng -->
            <div class="table-responsive">
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Thời gian</th>
                            <th>Biến động</th>
                            <th>Nội dung</th>
                        </tr>
                    </thead>
                    <tbody id="data-table-body">
                        <!-- Dữ liệu sẽ được thêm vào đây -->
                    </tbody>
                </table>
            </div>
        </div>
        <!-- Bootstrap Bundle with Popper -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
        <!-- Thêm thư viện MQTT.js -->
        <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

        <!-- Liên kết đến file js riêng -->
        <script src="N4xT8qW2mK7pL1zC5vB9aD3fG6hJ0rS4uY8iO2nP7eR1tV5wX9cZ3kM6bQ0dF4gH8jL2sA7yU1oI5pE9nC3rT6.js"></script>
        <script src="X7mK2pQ9aT4nV8cR1yW5jL3uZfB6sD0eHn8GpR4tY2kM9cW7qA1xF5vN3jL8uP6zT0bC4dE2gH9iK7oQ1rS5.js"></script>
        <script src="Q7mX2vN9kL4pR8tY1cD5fG0hJ3sW6zA2bE9uI7oP4qT1rV8nC5xM0dF3gH6jK2lS9yU7wZ1eB4.js"></script>
</body>

</html>
